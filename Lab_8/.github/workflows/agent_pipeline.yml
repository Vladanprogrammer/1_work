name: Python Agent Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Вкажи свою версію Python
          
      - name: Install Poetry
        run: curl -sSL https://install.python-poetry.org | python3 -
        
      - name: Install dependencies
        run: poetry install
        
      - name: Syntax check
        run: poetry run python -m py_compile agent.py